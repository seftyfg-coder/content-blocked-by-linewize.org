<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Web Proxy</title>
  <style>
    body, html { margin:0; padding:0; height:100%; display:flex; flex-direction:column; font-family:sans-serif; }
    #browserNav { padding:5px; display:flex; gap:5px; }
    #urlInput { flex:1; padding:5px; }
    #view { flex:1; overflow:auto; border-top:1px solid #ccc; }
    button { padding:5px 10px; }
    .browser-error { padding:20px; text-align:center; color:red; }
  </style>
</head>
<body>
  <div id="browserNav">
    <button id="browserBack">←</button>
    <button id="browserForward">→</button>
    <input type="text" id="urlInput" placeholder="Enter URL" />
    <button id="goBtn">Go</button>
  </div>
  <div id="view"></div>

  <script>
    const viewEl = document.getElementById("view");
    const urlInput = document.getElementById("urlInput");
    const backBtn = document.getElementById("browserBack");
    const forwardBtn = document.getElementById("browserForward");

    let browserTabs = [{
      id: 1,
      history: [],
      historyIndex: -1,
      url: "",
      title: ""
    }];
    let activeBrowserTab = 1;

    async function loadBrowserPage(url) {
      const currentTab = browserTabs.find(t => t.id === activeBrowserTab);
      if (!currentTab) return;

      if (!url.startsWith("http")) url = "https://" + url;
      currentTab.url = url;

      if (currentTab.historyIndex === -1 || currentTab.history[currentTab.historyIndex] !== url) {
        currentTab.history = currentTab.history.slice(0, currentTab.historyIndex + 1);
        currentTab.history.push(url);
        currentTab.historyIndex = currentTab.history.length - 1;
      }

      viewEl.innerHTML = "<p>Loading...</p>";

      try {
        const proxiedUrl = "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(url);
        const response = await fetch(proxiedUrl);
        if (!response.ok) throw new Error("Failed to load page");
        const rawHtml = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(rawHtml, "text/html");

        const urlObj = new URL(url);
        if (doc && doc.head) {
          const baseEl = doc.createElement("base");
          let baseHref = urlObj.origin + urlObj.pathname.replace(/[^/]*$/, "");
          if (!baseHref.endsWith("/")) baseHref += "/";
          baseEl.setAttribute("href", baseHref);
          doc.head.prepend(baseEl);
        }

        viewEl.innerHTML = doc.documentElement.innerHTML;

        // remove target from links/forms
        viewEl.querySelectorAll("a[target]").forEach(a => a.removeAttribute("target"));
        viewEl.querySelectorAll("form[target]").forEach(f => f.removeAttribute("target"));

        // re-add scripts to execute them
        Array.from(viewEl.querySelectorAll("script")).forEach(script => {
          const newScript = document.createElement("script");
          Array.from(script.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
          newScript.textContent = script.textContent;
          script.replaceWith(newScript);
        });

        // intercept link clicks
        viewEl.onclick = e => {
          const link = e.target.closest("a[href]");
          if (!link) return;
          const href = link.getAttribute("href");
          if (!href || href.startsWith("javascript:")) return;
          e.preventDefault();
          navigateBrowser(new URL(href, url).toString());
        };

        // intercept GET form submits
        viewEl.addEventListener("submit", e => {
          const form = e.target;
          if (!(form instanceof HTMLFormElement)) return;
          const method = (form.getAttribute("method") || "GET").toUpperCase();
          if (method !== "GET") return;
          e.preventDefault();
          const action = form.getAttribute("action") || url;
          const targetUrl = new URL(action, url);
          const params = new URLSearchParams(new FormData(form));
          targetUrl.search = params.toString();
          navigateBrowser(targetUrl.toString());
        }, true);

      } catch (error) {
        console.error("Browser error:", error);
        viewEl.innerHTML = `<div class="browser-error">
          <h2>Unable to Load Page</h2>
          <p>${error.message}</p>
          <button onclick="window.open('${url}','_blank')">Open in New Tab</button>
        </div>`;
      }

      updateBrowserNavButtons();
    }

    function navigateBrowser(url) {
      loadBrowserPage(url);
      urlInput.value = url;
    }

    function browserGoBack() {
      const currentTab = browserTabs.find(t => t.id === activeBrowserTab);
      if (!currentTab || currentTab.historyIndex <= 0) return;
      currentTab.historyIndex--;
      loadBrowserPage(currentTab.history[currentTab.historyIndex]);
    }

    function browserGoForward() {
      const currentTab = browserTabs.find(t => t.id === activeBrowserTab);
      if (!currentTab || currentTab.historyIndex >= currentTab.history.length - 1) return;
      currentTab.historyIndex++;
      loadBrowserPage(currentTab.history[currentTab.historyIndex]);
    }

    function updateBrowserNavButtons() {
      const currentTab = browserTabs.find(t => t.id === activeBrowserTab);
      backBtn.disabled = !currentTab || currentTab.historyIndex <= 0;
      forwardBtn.disabled = !currentTab || currentTab.historyIndex >= currentTab.history.length - 1;
    }

    document.getElementById("goBtn").onclick = () => navigateBrowser(urlInput.value);
    backBtn.onclick = browserGoBack;
    forwardBtn.onclick = browserGoForward;
    urlInput.addEventListener("keydown", e => { if (e.key === "Enter") navigateBrowser(urlInput.value); });
  </script>
</body>
</html>
