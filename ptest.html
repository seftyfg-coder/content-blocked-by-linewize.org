<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T9 Browser</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; font-family: Inter, system-ui; }

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #1e1e1e;
    overflow: hidden;
}

/* ===== TOP BAR ===== */
.browser-ui {
    height: 96px;
    background: #2b2b2b;
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid #111;
    z-index: 10;
}

/* ===== TABS ===== */
.tabs {
    height: 38px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    overflow-x: auto;
}

.tab {
    height: 28px;
    min-width: 160px;
    max-width: 220px;
    padding: 0 12px;
    border-radius: 8px 8px 0 0;
    background: #3a3a3a;
    color: #ddd;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

.tab.active {
    background: #1e1e1e;
    color: white;
}

.tab span {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.newtab {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #aaa;
    cursor: pointer;
}

.newtab:hover { background: #444; }

/* ===== NAV BAR ===== */
.navbar {
    height: 58px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
}

.navbar button {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #bbb;
    cursor: pointer;
}

.navbar button:hover {
    background: #3a3a3a;
    color: white;
}

/* ===== URL BAR ===== */
.urlbar {
    flex: 1;
    height: 36px;
    background: #3a3a3a;
    border-radius: 18px;
    padding: 0 16px;
    display: flex;
    align-items: center;
}

.urlbar input {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 14px;
}

/* ===== VIEWPORT ===== */
.viewframe {
    position: absolute;
    top: 96px;
    left: 0;
    width: 100%;
    height: calc(100% - 96px);
    border: none;
    display: none;
}

.viewframe.active {
    display: block;
}

/* ===== NTP ===== */
.ntp {
    position: absolute;
    top: 96px;
    left: 0;
    width: 100%;
    height: calc(100% - 96px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
}
</style>
</head>

<body>

<div class="browser-ui">
    <div class="tabs">
        <button class="newtab">+</button>
    </div>

    <div class="navbar">
        <button>←</button>
        <button>→</button>
        <button>⟳</button>

        <form class="urlbar">
            <input placeholder="Search or enter address">
        </form>

        <button>↗</button>
    </div>
</div>

<div class="ntp">
    <h1>T9 Browser</h1>
</div>


<script>
const frame = document.getElementById("frame")
const input = document.getElementById("url")

function normalize(u){
  if(!u.startsWith("http")) return "https://" + u
  return u
}

async function go(){
  const url = normalize(input.value)

  const isT9 =
    location.hostname === "t9os.space" ||
    location.hostname === "www.t9os.space"

  /* ===== T9 DOMAIN → CODETABS ===== */
  if(isT9){
    try{
      const res = await fetch(
        "https://api.codetabs.com/v1/proxy/?quest=" +
        encodeURIComponent(url)
      )

      const html = await res.text()

      const doc = new DOMParser()
        .parseFromString(html,"text/html")

      /* Fix relative links */
      const base = doc.createElement("base")
      base.href = url
      doc.head.prepend(base)

      /* Render page */
      frame.srcdoc = doc.documentElement.outerHTML

    }catch{
      frame.srcdoc = "<h1>Load failed</h1>"
    }
  }

  /* ===== OTHER DOMAINS → UV ===== */
  else{
    frame.src =
      __uv$config.prefix +
      __uv$config.encodeUrl(url)
  }
}

/* Enter key support */
input.addEventListener("keydown", e=>{
  if(e.key === "Enter") go()
})
</script>

</body>
</html>
