<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T9 Browser</title>

<!-- UV -->
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>

<style>
body{
  margin:0;
  background:#1e1e1e;
  font-family:sans-serif;
}

#top{
  display:flex;
  gap:8px;
  padding:10px;
  background:#2b2b2b;
}

#url{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

iframe{
  width:100%;
  height:calc(100vh - 60px);
  border:none;
  background:white;
}
</style>
</head>

<body>

<div id="top">
  <input id="url" placeholder="Enter URL">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
const frame = document.getElementById("frame")
const input = document.getElementById("url")

function normalize(u){
  if(!u.startsWith("http")) return "https://" + u
  return u
}

async function go(){
  const url = normalize(input.value)

  const isT9 =
    location.hostname === "t9os.space" ||
    location.hostname === "www.t9os.space"

  /* ===== T9 DOMAIN → CODETABS ===== */
  if(isT9){
    try{
      const res = await fetch(
        "https://api.codetabs.com/v1/proxy/?quest=" +
        encodeURIComponent(url)
      )

      const html = await res.text()

      const doc = new DOMParser()
        .parseFromString(html,"text/html")

      /* Fix relative links */
      const base = doc.createElement("base")
      base.href = url
      doc.head.prepend(base)

      /* Render page */
      frame.srcdoc = doc.documentElement.outerHTML

    }catch{
      frame.srcdoc = "<h1>Load failed</h1>"
    }
  }

  /* ===== OTHER DOMAINS → UV ===== */
  else{
    frame.src =
      __uv$config.prefix +
      __uv$config.encodeUrl(url)
  }
}

/* Enter key support */
input.addEventListener("keydown", e=>{
  if(e.key === "Enter") go()
})
</script>

</body>
</html>
